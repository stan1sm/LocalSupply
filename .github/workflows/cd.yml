name: CD

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-package:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Test backend
        working-directory: backend
        run: npm run test

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          if-no-files-found: error

  deploy-development:
    name: Deploy Development
    if: github.ref == 'refs/heads/development'
    needs: build-and-package
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set. Skipping migrations."
            exit 0
          fi
          for attempt in 1 2 3; do
            npm run prisma -- migrate deploy && break
            echo "Migration attempt $attempt failed."
            if [ $attempt -lt 3 ]; then
              echo "Retrying in 10s..."
              sleep 10
            else
              echo "All migration attempts failed."
              exit 1
            fi
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger frontend development deploy hook
        run: |
          if [ -n "${{ secrets.FRONTEND_DEPLOY_HOOK_URL_DEV }}" ]; then
            curl -fsSL -X POST "${{ secrets.FRONTEND_DEPLOY_HOOK_URL_DEV }}"
          else
            echo "FRONTEND_DEPLOY_HOOK_URL_DEV is not set. Skipping."
          fi

      - name: Trigger backend development deploy hook
        run: |
          if [ -n "${{ secrets.BACKEND_DEPLOY_HOOK_URL_DEV }}" ]; then
            curl -fsSL -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_URL_DEV }}"
          else
            echo "BACKEND_DEPLOY_HOOK_URL_DEV is not set. Skipping."
          fi

      - name: Verify frontend development deployment
        run: |
          if [ -n "${{ secrets.FRONTEND_HEALTHCHECK_URL_DEV }}" ]; then
            curl -fsSL "${{ secrets.FRONTEND_HEALTHCHECK_URL_DEV }}"
          else
            echo "FRONTEND_HEALTHCHECK_URL_DEV is not set. Skipping verification."
          fi

      - name: Verify backend development deployment
        run: |
          if [ -n "${{ secrets.BACKEND_HEALTHCHECK_URL_DEV }}" ]; then
            curl -fsSL "${{ secrets.BACKEND_HEALTHCHECK_URL_DEV }}"
          else
            echo "BACKEND_HEALTHCHECK_URL_DEV is not set. Skipping verification."
          fi

  deploy-production:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    needs: build-and-package
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set. Skipping migrations."
            exit 0
          fi
          for attempt in 1 2 3; do
            npm run prisma -- migrate deploy && break
            echo "Migration attempt $attempt failed."
            if [ $attempt -lt 3 ]; then
              echo "Retrying in 10s..."
              sleep 10
            else
              echo "All migration attempts failed."
              exit 1
            fi
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger frontend production deploy hook
        run: |
          if [ -n "${{ secrets.FRONTEND_DEPLOY_HOOK_URL_PROD }}" ]; then
            curl -fsSL -X POST "${{ secrets.FRONTEND_DEPLOY_HOOK_URL_PROD }}"
          else
            echo "FRONTEND_DEPLOY_HOOK_URL_PROD is not set. Skipping."
          fi

      - name: Trigger backend production deploy hook
        run: |
          if [ -n "${{ secrets.BACKEND_DEPLOY_HOOK_URL_PROD }}" ]; then
            curl -fsSL -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_URL_PROD }}"
          else
            echo "BACKEND_DEPLOY_HOOK_URL_PROD is not set. Skipping."
          fi

      - name: Verify frontend production deployment
        run: |
          if [ -n "${{ secrets.FRONTEND_HEALTHCHECK_URL_PROD }}" ]; then
            curl -fsSL "${{ secrets.FRONTEND_HEALTHCHECK_URL_PROD }}"
          else
            echo "FRONTEND_HEALTHCHECK_URL_PROD is not set. Skipping verification."
          fi

      - name: Verify backend production deployment
        run: |
          if [ -n "${{ secrets.BACKEND_HEALTHCHECK_URL_PROD }}" ]; then
            curl -fsSL "${{ secrets.BACKEND_HEALTHCHECK_URL_PROD }}"
          else
            echo "BACKEND_HEALTHCHECK_URL_PROD is not set. Skipping verification."
          fi
