services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: localsupply
      POSTGRES_PASSWORD: localsupply
      POSTGRES_DB: localsupply
    ports:
      - "5433:5432" # host:container
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localsupply -d localsupply"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: "postgresql://localsupply:localsupply@db:5432/localsupply"
    command: sh -c "npx prisma migrate deploy && npx tsx src/index.ts"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  db_data:
  backend_uploads:
