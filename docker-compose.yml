version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: localsupply
      POSTGRES_PASSWORD: localsupply
      POSTGRES_DB: localsupply
    ports:
      - "5433:5432" # host:container
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://localsupply:localsupply@db:5432/localsupply"
      PORT: "3001"
      FRONTEND_BASE_URL: "http://localhost:3000"
      BACKEND_BASE_URL: "http://localhost:3001"
      EMAIL_VERIFICATION_ALLOW_FALLBACK: "true"
      # set these as needed:
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: "mailer@example.com"
      SMTP_PASS: "password"
      SMTP_FROM: "LocalSupply <mailer@example.com>"
      KASSAL_API_KEY: "your-kassal-key"
      KASSALAPP_API_KEY: "your-kassal-key"
      KASSAL_API_BASE_URL: "https://kassal.app/api/v1"
    depends_on:
      - db
    ports:
      - "3001:3001"

volumes:
  db_data: